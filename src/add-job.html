<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Kaushan+Script&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"

</head>

<body>
    <div class="banner">
        <a href="index.html" class="logo-image-container">
            <img src="Vocatia.svg" class="logo-image" />
            <img src="VocatiaTextLogoInverted.svg" class="logo-content" />
        </a>
        <a onclick="showFullMenu()"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" id="menu-alt"
                class="menu-icon" fill="#000000">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                    <path d="M21,19H3a1,1,0,0,1,0-2H21a1,1,0,0,1,0,2Z" style="fill:#FFFFFF"></path>
                    <path d="M21,13H3a1,1,0,0,1,0-2H21a1,1,0,0,1,0,2Z" style="fill:#FFFFFF"></path>
                    <path d="M21,7H3A1,1,0,0,1,3,5H21a1,1,0,0,1,0,2Z" style="fill:#FFFFFF"></path>
                </g>
            </svg></a>
        <div class="link-group" id="the links">
            <a href="index.html">
                <p class="bannerp">Home</p>
            </a>
            <a href="postings.html">
                <p class="bannerp">Postings</p>
            </a>
            <a href="how-to.html">
                <p class="bannerp">How To</p>
            </a>
            <a href="about-us.html">
                <p class="bannerp">About Us</p>
            </a>
            <a>
                <button class="apply-button">
                    <svg height="24" width="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 0h24v24H0z" fill="none"></path>
                        <path
                            d="M5 13c0-5.088 2.903-9.436 7-11.182C16.097 3.564 19 7.912 19 13c0 .823-.076 1.626-.22 2.403l1.94 1.832a.5.5 0 0 1 .095.603l-2.495 4.575a.5.5 0 0 1-.793.114l-2.234-2.234a1 1 0 0 0-.707-.293H9.414a1 1 0 0 0-.707.293l-2.234 2.234a.5.5 0 0 1-.793-.114l-2.495-4.575a.5.5 0 0 1 .095-.603l1.94-1.832C5.077 14.626 5 13.823 5 13zm1.476 6.696l.817-.817A3 3 0 0 1 9.414 18h5.172a3 3 0 0 1 2.121.879l.817.817.982-1.8-1.1-1.04a2 2 0 0 1-.593-1.82c.124-.664.187-1.345.187-2.036 0-3.87-1.995-7.3-5-8.96C8.995 5.7 7 9.13 7 13c0 .691.063 1.372.187 2.037a2 2 0 0 1-.593 1.82l-1.1 1.039.982 1.8zM12 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"
                            fill="currentColor"></path>
                    </svg>
                    <span>Apply Now</span>
                </button>
            </a>
            <a href="login.html">
                <button class="clear-button log-in-button">
                    <span>Log In</span>
                </button>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="heading">Add New Job</div>
        <form class="form" action="">
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="title" id="title" />
                <label for="username">Title</label>
            </div>
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="company" id="company" />
                <label for="email">Company</label>
            </div>
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="salary" id="salary" />
                <label for="email">Salary</label>
            </div>
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="location" id="location" />
                <label for="email">Location</label>
            </div>
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="type" id="type" />
                <label for="email">Job Type</label>
            </div>
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="description" id="description" />
                <label for="email">Description</label>
            </div>
            <div class="input-field">
                <input required="" autocomplete="off" type="text" name="apply-link" id="apply-link" />
                <label for="email">Apply Link</label>
            </div>


            <div class="btn-container">
                <button type="submit" class="btn">Submit</button>
            </div>
        </form>
    </div>
</body>

</html>
